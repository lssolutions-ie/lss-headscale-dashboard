{{define "base"}}<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{{template "title" .}} — LSS Headscale Dashboard</title>
    <style>
        :root { color-scheme: light dark; }
        body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; max-width: 540px; margin: 3rem auto; padding: 0 1rem; line-height: 1.5; }
        h1 { font-size: 1.4rem; margin-bottom: 0.25rem; }
        .step { color: #6b7280; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
        form { margin-top: 1.5rem; }
        label { display: block; margin-top: 1rem; font-weight: 600; font-size: 0.9rem; }
        input[type=text], input[type=email], input[type=password] {
            width: 100%; padding: 0.55rem 0.7rem; margin-top: 0.25rem; box-sizing: border-box;
            border: 1px solid #d1d5db; border-radius: 6px; font-size: 1rem;
        }
        input[type=text]:focus, input[type=email]:focus, input[type=password]:focus {
            outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.15);
        }
        button { margin-top: 1.5rem; padding: 0.6rem 1.2rem; background: #2563eb; color: white;
                 border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        button:hover { background: #1d4ed8; }
        .err { color: #b91c1c; background: #fef2f2; border: 1px solid #fecaca; padding: 0.6rem 0.8rem; border-radius: 6px; margin-top: 1rem; }
        .codes { background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 6px;
                 padding: 1rem; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 0.95rem; }
        .codes ul { columns: 2; column-gap: 1.5rem; margin: 0; padding-left: 1.2rem; }
        .codes li { break-inside: avoid; }
        .qr { text-align: center; margin: 1rem 0; }
        .qr img { max-width: 240px; height: auto; border: 1px solid #e5e7eb; border-radius: 6px; }
        .secret { font-family: ui-monospace, monospace; background: #f3f4f6; padding: 0.4rem 0.6rem;
                  border-radius: 4px; display: inline-block; word-break: break-all; }
        .warn { background: #fffbeb; border: 1px solid #fde68a; padding: 0.7rem 0.9rem; border-radius: 6px; margin-top: 1rem; }
    </style>
</head>
<body>
{{template "content" .}}
</body>
</html>
{{end}}
