{{define "title"}}Sign in{{end}}
{{define "content"}}
<div class="page page-center">
    <div class="container container-tight py-4">
        <div class="text-center mb-4">
            <h1 class="navbar-brand navbar-brand-autodark">LSS Headscale Dashboard</h1>
        </div>
        <div class="card card-md">
            <div class="card-body">
                <h2 class="h2 text-center mb-4">Sign in to your account</h2>
                {{if .Error}}<div class="alert alert-danger">{{.Error}}</div>{{end}}
                <form method="post" action="/login" autocomplete="off" novalidate>
                    <input type="hidden" name="csrf" value="{{.CSRF}}">
                    <div class="mb-3">
                        <label class="form-label">Username or email</label>
                        <input type="text" name="username" class="form-control" autocomplete="username" autofocus required value="{{.Form.Username}}">
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" autocomplete="current-password" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">TOTP code</label>
                        <input type="text" name="code" class="form-control" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autocomplete="one-time-code" required>
                        <small class="form-hint">Lost your authenticator? Use a recovery code instead (8 chars or XXXX-XXXX-XXXX).</small>
                    </div>
                    <div class="form-footer">
                        <button type="submit" class="btn btn-primary w-100">Sign in</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{{end}}
