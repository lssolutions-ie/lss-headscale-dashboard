# fail2ban filter for LSS Headscale Dashboard.
# Reads from journald via the jail config; matches the slog text-handler line:
#   level=WARN msg="auth: failed login" user=foo ip=1.2.3.4
#
# IMPORTANT: keep this regex in lock-step with the Go log call site.
# See CLAUDE.md → "Logging conventions".

[Definition]
failregex = ^.*level=WARN.*msg="auth: failed login".*ip=<HOST>.*$
ignoreregex =
