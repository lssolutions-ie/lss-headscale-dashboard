# NGINX site for LSS Headscale Dashboard.
# Topology: HAProxy (TLS termination) -> NGINX (HTTP :80) -> 127.0.0.1:9000 (Go app)
# Drop into /etc/nginx/sites-available/ then symlink into sites-enabled/.

server {
    listen 80;
    server_name dashboard.example.com;

    # Tabler.io static assets served directly (skip the Go app).
    location /static/ {
        alias /var/lib/lss-headscale-dashboard/static/;
        access_log off;
        expires 7d;
    }

    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 60s;
    }
}
